  <style amp-custom="">
    * { box-sizing: border-box; margin:0; padding:0 }

    body {
      font-family: monospace;
      position: relative;
      background: #000000;
      background-image: radial-gradient(#d17600, 10%, transparent 50%);
      background-size: 5px 5px;
      background-attachment: fixed;
    }

    :root {
      --w-color: #d1b200;
      --b-color: #d1b200;
      --t1-color: #d1b200;
      --t2-color: #fc5102;
      --t3-color: #ff3c00;
      --t4-color: #ff3300;
      --t5-color: #fc0000;
      --t6-color: #ff4800;
      --yuji-color: #ffffff;
      --o-color: transparent;
      --o2-color: #ced100;
      --o3-color: #38fcfc;
    }

    .container {
      max-width: 400px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .textwel h3 {
      font-size: 12px;
      color: #fff;
      overflow: hidden;
      border-right: 0.15em solid #fba6a0;
      white-space: nowrap;
      letter-spacing: 0.09em;
      animation: typing 3.5s steps(40,end), blink-caret .75s step-end infinite;
    }

    @keyframes typing { from {width:0} to {width:100%} }
    @keyframes blink-caret {
      0%,100% { border-color:transparent }
      50% { border-color:#fbf4a0 }
    }

    .banner { border-radius: 10px }

    /* btn-menu tetap sama dengan versi sebelumnya */
    .btn-menu {
      border: none;
      outline: none;
      color: white;
      background: var(--o-color);
      cursor: pointer;
      position: relative;
      z-index: 5;
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
      padding: 15px;
      border-radius: 5px;
      letter-spacing: 2px;
      text-decoration: none;
      text-align: center;
      display: block;
    }
    .btn-menu:before {
      content: '';
      background: linear-gradient(45deg, var(--o-color), var(--t1-color), var(--t2-color), var(--o-color), var(--t2-color), var(--o-color), var(--t1-color));
      position: absolute;
      top: -2px; left:-2px;
      background-size: 300%;
      z-index: -1;
      filter: blur(5px);
      width: calc(100% + 4px);
      height: calc(100% + 4px);
      animation: glowing 20s linear infinite;
      opacity: 1;
      border-radius: 10px;
    }
    .btn-menu:after {
      z-index: -1;
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: var(--o-color);
      color: #fff;
      left: 0;
      top: 0;
      border-radius: 10px;
    }
    .btn-menu:hover { color: #fff }
    .btn-menu a, .btn-menu i { color:#fff }

    @keyframes glowing {
      0% { background-position: 0 0 }
      50% { background-position: 300% 0 }
      100% { background-position: 0 0 }
    }

    .copyright {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #fff;
    }

    .rawrrr-penida {
      margin-top: 15px;
      text-align: center;
      color: var(--t1-color);
      font-weight: bold;
    }

    .penida {
      display: inline-block;
      margin: 5px;
      padding: 3px;
      width: 45%;
      height: 32px;
      border-radius: 8px;
      border: 2px groove var(--t3-color);
      background: #fff;
      vertical-align: middle;
    }
    .penida img:first-child { width:65px; vertical-align:middle }
    .penida img:last-child { width:70px; vertical-align:middle }

    /* Efek Hacker Glitch untuk "MAHONGTOTO" */
    .vxken-text {
      color: #00ff99;
      font-family: monospace;
      font-weight: bold;
      text-shadow: 0 0 5px #00ff99, 0 0 10px #00ff99, 0 0 20px #00ff99;
      position: relative;
      display: inline-block;
      animation: glitch 2s infinite;
    }
    @keyframes glitch {
      0% { text-shadow: 2px 0 red, -2px 0 rgb(255, 8, 0); }
      20% { text-shadow: -2px -2px lime, 2px 2px rgb(255, 72, 0); }
      40% { text-shadow: 2px -2px rgb(255, 81, 0), -2px 2px yellow; }
      60% { text-shadow: -2px 0 red, 2px 0 rgb(255, 8, 0); }
      80% { text-shadow: 0 2px lime, 0 -2px rgb(255, 8, 0); }
      100% { text-shadow: 2px 0 red, -2px 0 rgb(255, 81, 0); }
    }
    .vxken-text::after {
      content:"_";
      animation: blink 1s infinite;
      margin-left: 2px;
    }
    @keyframes blink { 0%,50%,100%{opacity:1} 25%,75%{opacity:0} }
